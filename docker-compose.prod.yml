version: '3.8'

# Production compose — uses external RDS, no local DB, no dev volume binds.
# Usage: docker compose -f docker-compose.prod.yml up -d --build
# Run migrations manually: docker compose -f docker-compose.prod.yml exec web python manage.py migrate

services:
  web:
    build: .
    restart: unless-stopped
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    expose:
      - "8000"
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:alpine
    restart: unless-stopped
    expose:
      - "6379"

  celery_worker:
    build: .
    restart: unless-stopped
    command: celery -A spilbloo_backend worker --loglevel=info
    volumes:
      - media_volume:/app/media
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    env_file:
      - .env
    depends_on:
      - redis

  celery_beat:
    build: .
    restart: unless-stopped
    command: celery -A spilbloo_backend beat -l info
    env_file:
      - .env
    depends_on:
      - redis

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web

volumes:
  static_volume:
  media_volume:
  caddy_data:
  caddy_config: