{% extends "emails/base_email.html" %}

<p style="color: #6B7C75; font-size: 15px; line-height: 24px; margin: 0 0 12px 0; font-weight: 500;">Dear Customer,</p>
<p style="color: #6B7C75; font-size: 15px; line-height: 24px; margin: 0 0 20px 0;">

<p style="color: #6B7C75; font-size: 14px; line-height: 22px; margin: 0; padding-top: 16px; border-top: 1px solid #E8F3EF;">
