{% extends "emails/base_email.html" %}

{% block content %}
<h2 style="font-family: 'Crimson Pro', Georgia, serif; color: #1A2E26; margin: 0 0 16px 0; font-size: 24px; font-weight: 700; line-height: 1.2; text-align: center;">Account Verification Code</h2>
<p style="color: #6B7C75; font-size: 15px; line-height: 24px; margin: 0 0 20px 0; text-align: center; font-weight: 500;">Here is your one-time verification password:</p>

<!-- OTP Display Box -->
<table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom: 24px;">
  <tr>
    <td align="center">
      <div style="background-color: #E8F3EF; border: 1px solid rgba(76, 167, 123, 0.3); border-radius: 12px; padding: 16px 32px; display: inline-block;">
        <span style="font-size: 36px; font-weight: 700; color: #2F6C52; letter-spacing: 6px; font-family: 'Courier New', Courier, monospace; line-height: 1; margin-left: 6px;">{{ otp }}</span>
      </div>
    </td>
  </tr>
</table>

<p style="color: #9CA3AF; font-size: 13px; line-height: 20px; margin: 0; text-align: center; border-top: 1px solid #E8F3EF; padding-top: 16px;">
  Use this code to log into your account.
</p>
{% endblock %}
